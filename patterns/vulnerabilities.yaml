# Merged from vulnerabilities.yaml + attack-vectors.md
# mitigation: from YAML (omitted if empty or duplicates false_positives)
# fix: from MD Fix: (separate field, present only when Fix: exists in MD)
- id: VULN-001
  name: Cross-Chain Message Spoofing (Missing Endpoint/Peer Validation)
  severity: Critical
  description: >
    Receiver contract accepts cross-chain messages without verifying `msg.sender == endpoint` and `_origin.sender == registeredPeer[srcChainId]`. Attacker calls the receive function directly with fabricated message data, triggering unauthorized mints/unlocks.
  false_positives: >
    `onlyPeer` modifier or equivalent checks both `msg.sender` (endpoint) and `_origin.sender` (peer). Standard `OAppReceiver._acceptNonce` validates origin.
  cross_cluster_risk: true
- id: VULN-002
  name: EIP-7702 Code Inspection Opcode Invalidation
  severity: High
  description: >
    `extcodesize`, `extcodehash`, `extcodecopy` on delegated EOA operate on the 23-byte `0xef0100` delegation stub, not the delegate's code. `isContract()` checks misroute delegated EOAs. `extcodehash` comparisons against known implementation hashes fail. Proxy detection and ERC-1167 clone verification return unexpected results.
  false_positives: >
    No security-critical branching on `extcodesize`/`extcodehash`. Uses `CODESIZE`/`CODECOPY` within execution context (which follow delegation) rather than `EXT*` variants.
  cross_cluster_risk: false
- id: VULN-003
  name: Paymaster Gas Penalty Undercalculation
  severity: Critical
  description: >
    Paymaster prefund formula omits 10% EntryPoint penalty on unused execution gas (`postOpUnusedGasPenalty`). Large `executionGasLimit` with low usage drains paymaster deposit.
  false_positives: >
    Prefund explicitly adds unused-gas penalty. Conservative overestimation covers worst case.
  cross_cluster_risk: false
- id: VULN-004
  name: Reward Rate Changed Without Settling Accumulator
  severity: Medium
  description: >
    Admin updates emission rate without calling `updateReward()` first. New rate retroactively applied to entire elapsed period, overpaying or underpaying.
  false_positives: >
    Rate-change calls `updateReward()` before applying new rate. Modifier auto-settles on every state change.
  cross_cluster_risk: false
- id: VULN-005
  name: lzCompose Sender Impersonation (Composed Message Spoofing)
  severity: Critical
  description: >
    Two independent checks, BOTH required — missing either one is a finding: (a) `lzCompose` does not validate `msg.sender == address(endpoint)`. Attacker calls `lzCompose` directly. (b) `lzCompose` does not verify the sender/OApp parameter (`_from`, `_oApp`, or first address parameter) matches the expected trusted OFT/OApp address. Attacker spoofs the origin OApp via the endpoint relay or nested compose messages where sender context degrades to `address(this)`.
  false_positives: >
    BOTH (a) and (b) are present. No nested compose message support. Standard `OAppReceiver` modifier used.
  cross_cluster_risk: true
- id: VULN-006
  name: Tick Crossing Fee Accounting Manipulation via JIT
  severity: Medium
  description: >
    On tick crossing, `feesPerLiquidityOutside` flips (`global - outside`). JIT provider adds at tick boundary after fees accumulate but before crossing — flip credits position with pre-existing fees it didn't earn.
  false_positives: >
    `feesPerLiquidityInsideLast` set at creation; crossing correctly partitions pre/post fees. Same-block creation and crossing yield zero claimable.
  cross_cluster_risk: false
- id: VULN-007
  name: Withdrawal Queue Rate Lock-In Front-Run
  severity: High
  description: >
    `requestWithdraw()` locks exchange rate at request time, not claim time. Attacker front-runs pending loss event (slashing, depeg), locks pre-loss rate. Remaining depositors absorb full loss.
  false_positives: >
    Conversion at claim time using worst of request/claim rate. Same-block deposit+request prevented. Loss realization atomic with share price update.
  cross_cluster_risk: false
- id: VULN-008
  name: Partial Redemption Fails to Reduce Tracked Total
  severity: Medium
  description: >
    Partial redemption fill doesn't reduce `totalQueuedShares`/`totalPendingAssets` proportionally. Inflated total skews share price.
  false_positives: >
    Partial fill reduces tracked totals proportionally. Per-request tracking. Atomic full-or-nothing redemptions.
  cross_cluster_risk: false
- id: VULN-009
  name: ERC1155 safeBatchTransferFrom Unchecked Array Lengths
  severity: Medium
  description: >
    Custom `_safeBatchTransferFrom` iterates `ids`/`amounts` without `require(ids.length == amounts.length)`. Assembly-optimized paths may silently read uninitialized memory.
  false_positives: >
    OZ ERC1155 base used unmodified. Custom override asserts equal lengths as first statement.
  cross_cluster_risk: false
- id: VULN-010
  name: EIP-7702 Whitelist / Allowlist Privilege Borrowing
  severity: High
  description: >
    Whitelisted address signs EIP-7702 delegation. Attacker includes that authorization in their tx, calls the delegated address — target contract sees `msg.sender == whitelisted_address`. One phished signature becomes a permanent gateway for unlimited actors.
  false_positives: >
    Access control rejects delegation designator prefix (`0xef0100`). Whitelist requires per-call signature, not just address check.
  cross_cluster_risk: false
- id: VULN-011
  name: Deprecated Gauge Blocks Claiming Accrued Rewards
  severity: Medium
  description: >
    Killing/deprecating gauge blocks `claimReward()` for already-accrued, unclaimed rewards — users who earned before deprecation cannot retrieve.
  false_positives: >
    Kill stops future accrual only — claim remains active for pre-kill balances. Emergency claim bypasses active check.
  cross_cluster_risk: false
- id: VULN-012
  name: Force-Feeding ETH via selfdestruct / Coinbase / CREATE2 Pre-Funding
  severity: Critical
  description: >
    Contract uses `address(this).balance` for accounting or gates logic on exact balance (e.g., `require(balance == totalDeposits)`). `selfdestruct(target)`, coinbase rewards, or pre-computed `CREATE2` deposits force ETH in without calling `receive()`/`fallback()`, breaking invariants.
  false_positives: >
    Internal accounting only (`totalDeposited` state variable, never reads `address(this).balance`). Contract designed to accept arbitrary ETH (e.g., WETH wrapper).
  cross_cluster_risk: false
- id: VULN-013
  name: EIP-7702 Dual Signature Validation Confusion
  severity: Critical
  description: >
    Delegated EOA supports both ECDSA (private key) and ERC-1271 (`isValidSignature` from delegate). Protocol checking only one path lets attacker exploit the other. Signature replay across redelegation — message signed under Delegate A interpreted differently by Delegate B.
  false_positives: >
    OZ `SignatureChecker.isValidSignatureNow` used. ERC-1271 checked first for accounts with code, ECDSA fallback for codeless. Signatures include delegate address in EIP-712 domain.
  cross_cluster_risk: false
- id: VULN-014
  name: JIT Liquidity on Deterministic TWAMM Virtual Order Execution
  severity: Medium
  description: >
    TWAMM virtual orders execute at deterministic intervals with publicly readable sale rates. Attacker adds concentrated liquidity before execution, captures fees from predictable flow, removes immediately. No mempool needed — timing fully on-chain.
  false_positives: >
    Time-weighted fee discount for liquidity added within execution window. Execution boundary randomized. Same-block positions excluded from TWAMM fee capture.
  cross_cluster_risk: true
- id: VULN-015
  name: Fixed-End Auction Last-Block Sniping
  severity: Medium
  description: >
    On-chain auction with fixed `endBlock`/`endTime` and no extension. Validator places winning bid in final block, censors competitors. Pattern: `require(block.timestamp <= endTime)` without anti-snipe extension.
  false_positives: >
    Auction extends on late bids. Candle auction (random end). Sealed-bid second-price. Batch/uniform-price clearing.
  cross_cluster_risk: false
- id: VULN-016
  name: Adverse Selection — Passive LP Value Extraction via Selective JIT
  severity: Medium
  description: >
    No time-weighting or lock on fee distribution. JIT providers enter only during high-fee moments and exit during adverse moves. Passive LPs bear 100% IL but share fees with JIT providers bearing zero IL.
  false_positives: >
    Fee share time-weighted by duration. Dynamic fee increases during volatility. Withdrawal cooldown makes selective entry costly.
  cross_cluster_risk: false
- id: VULN-017
  name: Governance Flash-Loan Upgrade Hijack
  severity: Critical
  description: >
    Proxy upgrades via governance using current-block vote weight (`balanceOf` or `getPastVotes(block.number)`). No voting delay or timelock. Flash-borrow, vote, execute upgrade in one tx.
  false_positives: >
    `getPastVotes(block.number - 1)`. Timelock 24-72h. High quorum thresholds. Staking lockup required.
  cross_cluster_risk: true
- id: VULN-018
  name: Non-Standard ERC20 Return Values (USDT-style)
  severity: Medium
  description: >
    `require(token.transfer(to, amount))` reverts on tokens returning nothing (USDT, BNB). Or return value ignored (silent failure). - **Fix:** Always recommend OZ `SafeERC20.safeTransfer()`/`safeTransferFrom()`. Never recommend `require(token.transfer(...))` — that pattern is itself the bug for non-standard tokens.
  false_positives: >
    OZ `SafeERC20.safeTransfer()`/`safeTransferFrom()` used throughout.
  fix: >
    Always recommend OZ `SafeERC20.safeTransfer()`/`safeTransferFrom()`. Never recommend `require(token.transfer(...))` — that pattern is itself the bug for non-standard tokens.
  cross_cluster_risk: false
- id: VULN-019
  name: TWAP Accumulator Not Updated During Sync or Skim
  severity: High
  description: >
    `sync()`/`skim()` updates reserves but doesn't call `_update()` to advance TWAP accumulator. Stale TWAP enables manipulation via sync-then-trade.
  false_positives: >
    `sync()` calls `_update()` before overwriting reserves. TWAP from external oracle. Uniswap V3 `observe()` used.
  cross_cluster_risk: true
- id: VULN-020
  name: Cross-Chain Sandwich via Bridge Parameter Exposure
  severity: High
  description: >
    Bridge tx on source chain exposes destination swap params (`amountOutMin`, token, amount) in plaintext. Attacker frontruns on destination L2 to manipulate pool, backruns after bridge tx executes.
  false_positives: >
    Encrypted/committed bridge payloads. Destination swap recalculates slippage via oracle. Intent-based bridge (solver fills off-chain).
  cross_cluster_risk: true
- id: VULN-021
  name: Funding Rate Derived from Single Trade Price
  severity: Medium
  description: >
    Perp funding rate uses last trade price as mark. Single self-trade at extreme price skews funding — attacker profits on opposing position.
  false_positives: >
    Mark from TWAP or external oracle. Funding rate capped per period. VWAP used.
  cross_cluster_risk: false
- id: VULN-022
  name: Loan State Transition Before Interest Settlement
  severity: Medium
  description: >
    Repay sets loan to `Repaid` before interest settled. Accrual skips `Repaid` loans — accumulated interest permanently uncollectable.
  false_positives: >
    `settleInterest()` before state transition. `require(msg.value >= principal + accruedInterest)`.
  cross_cluster_risk: false
- id: VULN-023
  name: Missing Slippage Protection on Vault Withdraw/Redeem
  severity: High
  description: >
    ERC4626 `withdraw`/`redeem` accept no slippage parameter. Exchange rate changes between submission and execution (yield, donations, losses). Users receive fewer assets or burn more shares than expected.
  false_positives: >
    Fixed 1:1 exchange rate. Custom `withdrawWithSlippage` wrapper. Frontend simulation with revert. Loss-proof yield source.
  cross_cluster_risk: false
- id: VULN-024
  name: Dirty Higher-Order Bits on Sub-256-Bit Types
  severity: Medium
  description: >
    Assembly loads a value as a full 32-byte word (`calldataload`, `sload`, `mload`) but treats it as a smaller type (`address`, `uint128`, `uint8`, `bool`) without masking upper bits. Dirty bits cause incorrect comparisons, mapping key mismatches, or storage corruption. Pattern: `let addr := calldataload(4)` used directly without `and(addr, 0xffffffffffffffffffffffffffffffffffffffff)`.
  false_positives: >
    Explicit bitmask applied: `and(value, mask)` immediately after load. Value produced by a prior Solidity expression that already cleaned it. `shr(96, calldataload(offset))` pattern that naturally zeros
  mitigation: >
    Explicit bitmask applied: `and(value, mask)` immediately after load. Value produced by a prior Solidity expression that already cleaned it. `shr(96, calldataload(offset))` pattern that naturally zeros upper bits for addresses.
  cross_cluster_risk: false
- id: VULN-025
  name: Unsafe Downcast / Integer Truncation
  severity: Medium
  description: >
    `uint128(largeUint256)` without bounds check. Solidity >= 0.8 silently truncates on downcast (no revert). Dangerous in price feeds, share calculations, timestamps.
  false_positives: >
    `require(x <= type(uint128).max)` before cast. OZ `SafeCast` used.
  cross_cluster_risk: false
- id: VULN-026
  name: Small-Type Arithmetic Overflow Before Upcast
  severity: Medium
  description: >
    Arithmetic on `uint8`/`uint16`/`uint32` before assigning to wider type: `uint256 result = a * b` where `a`,`b` are `uint8`. Overflow happens in narrow type before widening.
  false_positives: >
    Operands explicitly upcast before operation: `uint256(a) * uint256(b)`. SafeCast used.
  cross_cluster_risk: false
- id: VULN-027
  name: Missing chainId (Cross-Chain Replay)
  severity: Critical
  description: >
    Signed payload omits `chainId`. Valid signature replayable on forks/other EVM chains. Or `chainId` hardcoded at deployment instead of `block.chainid`.
  false_positives: >
    EIP-712 domain separator includes dynamic `chainId: block.chainid` and `verifyingContract`.
  cross_cluster_risk: true
- id: VULN-028
  name: Chainlink Staleness / No Validity Checks
  severity: High
  description: >
    `latestRoundData()` called but missing checks: `answer > 0`, `updatedAt > block.timestamp - MAX_STALENESS`, `answeredInRound >= roundId`, fallback on failure.
  false_positives: >
    All four checks present. Circuit breaker or fallback oracle on failure.
  cross_cluster_risk: false
- id: VULN-029
  name: Signed Integer Mishandling (signextend / sar / slt Confusion)
  severity: Medium
  description: >
    Assembly performs arithmetic on signed integers but uses unsigned opcodes. `shr` instead of `sar` (arithmetic shift right) loses the sign bit. `lt`/`gt` instead of `slt`/`sgt` treats negative numbers as huge positives. Missing `signextend` when loading a signed value smaller than 256 bits from calldata or storage.
  false_positives: >
    Code consistently uses `sar`/`slt`/`sgt` for signed operations and `shr`/`lt`/`gt` for unsigned. `signextend(byteWidth - 1, val)` applied after loading sub-256-bit signed values. Code only operates on
  mitigation: >
    Code consistently uses `sar`/`slt`/`sgt` for signed operations and `shr`/`lt`/`gt` for unsigned. `signextend(byteWidth - 1, val)` applied after loading sub-256-bit signed values. Code only operates on unsigned integers.
  cross_cluster_risk: false
- id: VULN-030
  name: ERC777 tokensToSend / tokensReceived Reentrancy
  severity: Critical
  description: >
    Token `transfer()`/`transferFrom()` called before state updates on a token that may implement ERC777 (ERC1820 registry). ERC777 hooks fire on ERC20-style calls, enabling reentry from sender's `tokensToSend` or recipient's `tokensReceived`.
  false_positives: >
    CEI — all state committed before transfer. `nonReentrant` on all entry points. Token whitelist excludes ERC777.
  cross_cluster_risk: true
- id: VULN-031
  name: Storage Layout Collision Between Proxy and Implementation
  severity: High
  description: >
    Proxy declares state variables at sequential slots (not EIP-1967). Implementation also starts at slot 0. Proxy's admin overlaps implementation's `initialized` flag.
  false_positives: >
    EIP-1967 slots. OZ Transparent/UUPS pattern. No state variables in proxy contract.
  cross_cluster_risk: false
- id: VULN-032
  name: Token Decimal Mismatch in Cross-Token Arithmetic
  severity: Medium
  description: >
    Cross-token math uses hardcoded `1e18` or assumes identical decimals. Pattern: collateral/LTV/rate calculations combining token amounts without per-token `decimals()` normalization.
  false_positives: >
    Amounts normalized to canonical precision (WAD/RAY) using each token's `decimals()`. Explicit `10 ** (18 - decimals())` scaling. Protocol only supports tokens with identical verified decimals.
  cross_cluster_risk: false
- id: VULN-033
  name: ERC4626 Caller-Dependent Conversion Functions
  severity: Medium
  description: >
    `convertToShares()`/`convertToAssets()` branches on `msg.sender`-specific state (per-user fees, whitelist, balances). EIP-4626 requires caller-independence. Downstream aggregators get wrong sizing.
  false_positives: >
    Implementation reads only global vault state (`totalSupply`, `totalAssets`, protocol-wide fee constants).
  cross_cluster_risk: false
- id: VULN-034
  name: Permit Signature Frontrun Griefing
  severity: High
  description: >
    Contract calls `permit()` then `transferFrom()` sequentially. Attacker extracts permit from mempool, calls `permit()` first — nonce consumed, user's tx reverts.
  false_positives: >
    `try token.permit(...) {} catch {}` — permit failure non-fatal. Permit2 with unordered nonces. Direct approval flow.
  cross_cluster_risk: false
- id: VULN-035
  name: Slippage Enforced at Intermediate Step, Not Final Output
  severity: High
  description: >
    Multi-hop swap checks `minAmountOut` on the first hop or an intermediate step, but the amount actually received by the user at the end of the pipeline has no independent slippage bound. Second/third hops can be sandwiched freely.
  false_positives: >
    `minAmountOut` validated against the user's final received balance (delta check). Single-hop swap. User specifies per-hop minimums.
  cross_cluster_risk: false
- id: VULN-036
  name: False Existence Detection via Balance Check at Computed Address
  severity: Medium
  description: >
    Contract checks pool/pair existence via `balanceOf()` at computed CREATE2 address. Pre-sent tokens make `balanceOf > 0` before deployment — logic assumes pool exists, attempts swap, reverts.
  false_positives: >
    Existence via factory: `factory.getPair(A, B) != address(0)`. `code.length > 0` checked. Pool verified by calling pool-specific function (`getReserves()`, `token0()`).
  cross_cluster_risk: false
- id: VULN-037
  name: Missing Cross-Chain Rate Limits / Circuit Breakers
  severity: Medium
  description: >
    Bridge or OFT contract has no per-transaction or time-window transfer caps. No pause mechanism to halt operations during an active exploit.
  false_positives: >
    Per-tx and per-window rate limits configured (e.g., Chainlink CCIP per-lane limits). `whenNotPaused` modifier on send/receive. Anomaly detection with automated pause. Guardian/emergency multisig can f
  mitigation: >
    Per-tx and per-window rate limits configured (e.g., Chainlink CCIP per-lane limits). `whenNotPaused` modifier on send/receive. Anomaly detection with automated pause. Guardian/emergency multisig can freeze operations.
  cross_cluster_risk: true
- id: VULN-038
  name: Weak On-Chain Randomness
  severity: Medium
  description: >
    Randomness from `block.prevrandao`, `blockhash(block.number - 1)`, `block.timestamp`, `block.coinbase`, or combinations. Validator-influenceable or visible before inclusion.
  false_positives: >
    Chainlink VRF v2+. Commit-reveal with future-block reveal and slashing for non-reveal.
  cross_cluster_risk: false
- id: VULN-039
  name: Spot Price Oracle from AMM
  severity: High
  description: >
    Price from AMM reserves: `reserve0 / reserve1`, `getAmountsOut()`, `getReserves()`. Flash-loan exploitable atomically.
  false_positives: >
    TWAP >= 30 min window. Chainlink/Pyth as primary source.
  cross_cluster_risk: true
- id: VULN-040
  name: Liquidation Discount Applied Inconsistently Across Code Paths
  severity: High
  description: >
    One path calculates debt at face value, another applies discount. Mismatch causes underflow or leaves residual bad debt unaccounted.
  false_positives: >
    Discount applied consistently across all liquidation paths. Single source of truth for discounted value.
  cross_cluster_risk: true
- id: VULN-041
  name: Beacon Proxy Single-Point-of-Failure Upgrade
  severity: Critical
  description: >
    Multiple proxies read implementation from single Beacon. Compromising Beacon owner upgrades all proxies at once. `UpgradeableBeacon.owner()` returns single EOA.
  false_positives: >
    Beacon owner is multisig + timelock. `Upgraded` events monitored. Per-proxy upgrade authority where isolation required.
  cross_cluster_risk: false
- id: VULN-042
  name: Upgrade Race Condition / Front-Running
  severity: Critical
  description: >
    `upgradeTo(V2)` and post-upgrade config calls are separate txs in public mempool. Window for front-running (exploit old impl) or sandwiching between upgrade and config.
  false_positives: >
    `upgradeToAndCall()` bundles upgrade + init. Private mempool (Flashbots Protect). V2 safe with V1 state from block 0. Timelock makes execution predictable.
  cross_cluster_risk: false
- id: VULN-043
  name: LST Redemption-Rate vs Market-Price Divergence
  severity: Medium
  description: >
    LST collateral valued at protocol redemption rate (`stETH.getPooledEthByShares()`) while market trades at discount. Borrower posts overvalued collateral, borrows against inflated value. During stress, redemption rate stays high while market drops — bad debt.
  false_positives: >
    Market price feed (Chainlink stETH/ETH) used. `min(redemptionRate, marketPrice)` for valuation. LTV haircut for historical deviation. Circuit breaker on divergence.
  cross_cluster_risk: false
- id: VULN-044
  name: Returndatasize-as-Zero Assumption
  severity: Medium
  description: >
    Assembly uses `returndatasize()` as a gas-cheap substitute for `push 0` (saves 1 gas). If a prior `call`/`staticcall` in the same execution context returned data, `returndatasize()` is nonzero, corrupting the intended zero value. Pattern: `let ptr := returndatasize()` or `mstore(returndatasize(), value)` after an external call has been made.
  false_positives: >
    `returndatasize()` used as zero only at the very start of execution before any external calls. Used immediately after a controlled call where the return size is known. Used as an actual size measureme
  mitigation: >
    `returndatasize()` used as zero only at the very start of execution before any external calls. Used immediately after a controlled call where the return size is known. Used as an actual size measurement (its intended purpose).
  cross_cluster_risk: false
- id: VULN-045
  name: ERC1155 Fungible / Non-Fungible Token ID Collision
  severity: Medium
  description: >
    ERC1155 represents both fungible and unique items with no enforcement: missing `require(totalSupply(id) == 0)` before NFT mint, or no cap preventing additional copies of supply-1 IDs.
  false_positives: >
    `require(totalSupply(id) + amount <= maxSupply(id))` with `maxSupply=1` for NFTs. Fungible/NFT ID ranges disjoint and enforced. Role tokens non-transferable.
  cross_cluster_risk: false
- id: VULN-046
  name: Array `delete` Leaves Zero-Value Gap Instead of Removing Element
  severity: Medium
  description: >
    `delete array[index]` resets element to zero but does not shrink the array or shift subsequent elements. Iteration logic treats the zeroed slot as a valid entry — phantom zero-address recipients, skipped distributions, or inflated `length`.
  false_positives: >
    Swap-and-pop pattern used (`array[index] = array[length - 1]; array.pop()`). Iteration skips zero entries explicitly. EnumerableSet or similar library used.
  cross_cluster_risk: false
- id: VULN-047
  name: Merkle Proof Reuse — Leaf Not Bound to Caller
  severity: High
  description: >
    Merkle leaf doesn't include `msg.sender`: `MerkleProof.verify(proof, root, keccak256(abi.encodePacked(amount)))`. Proof can be front-run from different address.
  false_positives: >
    Leaf encodes `msg.sender`: `keccak256(abi.encodePacked(msg.sender, amount))`. Proof recorded as consumed after first use.
  cross_cluster_risk: false
- id: VULN-048
  name: Missing chainId / Message Uniqueness in Bridge
  severity: Critical
  description: >
    Three independent checks, ALL required — missing any one is a finding: (a) No `processedMessages[hash]` or equivalent replay check. Same message processable multiple times on the same chain. (b) No `destinationChainId == block.chainid` validation. Message intended for chain A processable on chain B. (c) Source chain ID not included in message hash. Messages from different source chains produce identical hashes, enabling cross-chain replay.
  false_positives: >
    ALL three present: (a) unique nonce/hash stored and checked before processing, (b) destination chain validated, (c) hash includes `(sourceChain, destChain, nonce, payload)`. Contract address in hash.
  cross_cluster_risk: true
- id: VULN-049
  name: Quorum Computed from Live Supply, Not Snapshot
  severity: Medium
  description: >
    `quorum = totalSupply() * quorumBps / 10000` reads current supply. Attacker inflates supply after proposal creation, lowering effective quorum percentage.
  false_positives: >
    Quorum snapshotted at proposal creation. Fixed absolute quorum. Supply changes don't affect active proposals.
  cross_cluster_risk: false
- id: VULN-050
  name: Integer Overflow / Underflow
  severity: Medium
  description: >
    Arithmetic in `unchecked {}` (>=0.8) without prior bounds check: subtraction without `require(amount <= balance)`, large multiplications. Any arithmetic in <0.8 without SafeMath.
  false_positives: >
    Range provably bounded by earlier checks in same function. `unchecked` only for `++i` loop increments where `i < arr.length`.
  cross_cluster_risk: false
- id: VULN-051
  name: Share Redemption at Optimistic Rate
  severity: Medium
  description: >
    Shares redeemed at projected end-of-term rate rather than current realized rate. Early redeemers take more than proportional share — late redeemers find vault depleted.
  false_positives: >
    Redemption uses current realized rate (`totalAssets() / totalSupply()`). Withdrawal queue enforces proportional access. Early redemption penalty applied.
  cross_cluster_risk: false
- id: VULN-052
  name: Rounding in Favor of the User
  severity: Medium
  description: >
    `shares = assets / pricePerShare` rounds down for deposit but up for redeem. Division without explicit rounding direction. First-depositor donation amplifies the error.
  false_positives: >
    `Math.mulDiv` with explicit `Rounding.Up` where vault-favorable. OZ ERC4626 `_decimalsOffset()`. Dead shares at init.
  cross_cluster_risk: false
- id: VULN-053
  name: UUPS Upgrade Logic Removed in New Implementation
  severity: Critical
  description: >
    New UUPS implementation doesn't inherit `UUPSUpgradeable` or removes `upgradeTo`/`upgradeToAndCall`. Proxy permanently loses upgrade capability. Pattern: V2 missing `_authorizeUpgrade` override.
  false_positives: >
    Every version inherits `UUPSUpgradeable`. Tests verify `upgradeTo` works after each upgrade. OZ upgrades plugin checks in CI.
  cross_cluster_risk: false
- id: VULN-054
  name: Uninitialized Implementation Takeover
  severity: Critical
  description: >
    Implementation behind proxy has `initialize()` but constructor lacks `_disableInitializers()`. Attacker calls `initialize()` on implementation directly, becomes owner, can upgrade to malicious contract.
  false_positives: >
